# ===== 持仓管理系统 Nginx 反代配置（HTTP · 公网IP临时版） =====
# 适用：域名还没下来，先用 http://服务器公网IP 访问。
# 用法：服务器上执行  cp deploy/nginx-portfolio-http.conf /etc/nginx/conf.d/portfolio.conf
#      然后  nginx -t && systemctl restart nginx
# 等域名申请下来、拿到 SSL 证书后，换成 deploy/nginx-portfolio.conf（HTTPS 版）即可。

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    client_max_body_size 10m;

    location / {
        proxy_pass http://127.0.0.1:3000;   # ← 与 .env 的 PORT 一致
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
