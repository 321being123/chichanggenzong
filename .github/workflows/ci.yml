name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  # 快速语法检查（不连数据库/外部服务）
  syntax-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # actions/checkout@v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # actions/setup-node@v4
        with:
          node-version: '22'
      - name: 安装依赖（npm ci）
        run: npm ci
      - name: Node 语法检查
        run: |
          fail=0
          for f in $(git ls-files '*.js'); do
            if ! node --check "$f"; then echo "语法错误: $f"; fail=1; fi
          done
          [ "$fail" -eq 0 ] && echo "全部 JS 语法检查通过" || { echo "存在语法错误，CI 失败"; exit 1; }
      - name: Python 语法检查
        run: |
          fail=0
          while IFS= read -r f; do
            if ! python3 -m py_compile "$f"; then echo "Python 语法错误: $f"; fail=1; fi
          done < <(git ls-files '*.py')
          [ "$fail" -eq 0 ] && echo "全部 Python 语法检查通过" || { echo "存在 Python 语法错误，CI 失败"; exit 1; }

  # 统一测试入口：单元/集成（PostgreSQL）/安全专项/IPO前端/Python功能，全部纳入
  full-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: portfolio
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      PGHOST: localhost
      PGPORT: '5432'
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: portfolio
      AI_ALLOWED_HOSTS: 'api.openai.com'
      ALLOWED_ORIGIN: 'localhost,127.0.0.1'
      TUSHARE_TOKEN: ${{ secrets.TUSHARE_TOKEN }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # actions/checkout@v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # actions/setup-node@v4
        with:
          node-version: '22'
      - name: 安装依赖（npm ci）
        run: npm ci
      - name: 准备 Python venv 并安装依赖（用于 Python 功能测试）
        run: |
          python3 -m venv ipo-report/venv
          ipo-report/venv/bin/pip install -r requirements.txt
      - name: 统一测试入口（test:all 含单元/集成/安全/IPO前端/Python功能）
        run: npm run test:all

  # 依赖漏洞审计：高危即阻断构建（不再用 || true 放行）
  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # actions/checkout@v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # actions/setup-node@v4
        with:
          node-version: '22'
      - name: 安装依赖（npm ci）
        run: npm ci
      - name: npm 依赖审计（高危即阻断）
        run: npm audit --audit-level=high

  # 秘密扫描：检测仓库历史与当前代码中泄露的密钥/密码
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks 秘密扫描
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_ENABLE_UPLOAD_ARTIFACT: "false"
