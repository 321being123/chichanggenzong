# 本地开发一键起 PostgreSQL + 应用（可选）
# 用法：docker compose up -d
# 应用容器通过 DATABASE_URL 连到同网络下的 postgres 服务
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: portfolio
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d portfolio"]
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/portfolio
      PORT: "3000"
      ALLOWED_ORIGIN: localhost,127.0.0.1
    ports:
      - "3000:3000"

volumes:
  pgdata:
