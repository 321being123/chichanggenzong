# ===== 持仓管理系统 Nginx 反代配置 =====
# 用法：把本文件放到 /etc/nginx/conf.d/portfolio.conf（或 sites-enabled/）
# 然后 `nginx -t` 校验，`systemctl reload nginx` 生效
# 证书：腾讯云申请免费 SSL 后，将 fullchain.pem / privkey.pem 放到下面路径

# HTTP 80 端口：强制跳转 HTTPS
server {
    listen 80;
    server_name myapp.com www.myapp.com;   # ← 改成你的域名
    return 301 https://$host$request_uri;
}

# HTTPS 443 端口：反代到本地 Node 服务（端口与 .env 的 PORT 一致）
server {
    listen 443 ssl;
    server_name myapp.com www.myapp.com;    # ← 改成你的域名

    ssl_certificate     /etc/nginx/ssl/myapp.com/fullchain.pem;   # ← 改成你的证书路径
    ssl_certificate_key /etc/nginx/ssl/myapp.com/privkey.pem;     # ← 改成你的证书路径
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;

    # HSTS：强制浏览器只用 HTTPS
    add_header Strict-Transport-Security "max-age=31536000" always;

    client_max_body_size 10m;

    location / {
        proxy_pass http://127.0.0.1:3000;   # ← 与 PORT 一致
        proxy_http_version 1.1;
        proxy_connect_timeout 10s;
        proxy_read_timeout 120s;   # AI 识别最长约 60s，留足余量
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
